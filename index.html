    <script>
      (function() {
        if (typeof window !== 'undefined') {
          try {
            var originalFetch = window.fetch;
            var currentFetch = originalFetch;
            Object.defineProperty(window, 'fetch', {
              get: function() {
                return currentFetch;
              },
              set: function(val) {
                currentFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            try {
              Object.defineProperty(Window.prototype, 'fetch', {
                get: function() {
                  return currentFetch;
                },
                set: function(val) {
                  currentFetch = val;
                },
                configurable: true,
                enumerable: true
              });
            } catch (e2) {
              console.warn('Fetch polyfill failed:', e2);
            }
          }
        }
      })();
    </script>
